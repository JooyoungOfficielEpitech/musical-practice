name: Supabase keep-alive

# Free-tier Supabase pauses projects after ~7 days without API activity,
# which takes down auth/storage/OMR queue for the app. A twice-weekly
# read query keeps the project active.
on:
  schedule:
    - cron: "0 3 * * 1,4" # Mon & Thu 03:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query omr_jobs to register activity
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/omr_jobs?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "status: $code"
          if [ "$code" != "200" ]; then
            echo "Supabase ping failed — project may be paused" >&2
            exit 1
          fi
